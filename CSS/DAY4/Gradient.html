<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            border: 1px solid;
            height: 200px;

            /* linear gradient */
             background-image: linear-gradient( red , blue , green , purple, yellow);
            background-image: linear-gradient(to top , red , blue , green , purple, yellow);
             background-image: linear-gradient(to left , red , blue , green , purple, yellow);
            background-image: linear-gradient(to right , red , blue , green , purple, yellow);

        }

        #demo{
            border: 1px solid;
            height: 150px;

            background-image: radial-gradient(red, yellow , purple, green, chocolate);
        }

        #demo1{
            border: 1px solid;
            height: 250px;
            width: 350px;
            background-image: radial-gradient(circle ,red, yellow , purple, green, chocolate);
        }

    </style>
</head>
<body>
    
    <div class="container">
    
    </div>

     <div id="demo">

        </div>

        <div id="demo1">

        </div>
</body>
</html>
