<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
            padding: 12px;
            transition: background-color 0.5s ease;
        }
        /* Screen only */
          @media screen {
              body::before{
                 content: "This is visible on screen";
                 display: block;
                 font-weight: bold;
              }
          }

          /* 2 print only */
        @media print{
             body{
                background-color: white;
                color: orange;
             }
             body::before{
                content: "Print version";
                display: block;
                font-weight: bold;
             }
         }
