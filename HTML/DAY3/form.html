<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="" method="get" autocomplete="off">
      <h1>Registration Form</h1>
      <label for="demo">FirstName :</label>
      <input type="text" name="demo" /> <br />
      LastName : <input type="text" placeholder="Enter LastName" /> <br />
      Email : <input type="email" placeholder="john@gmail.com" autofocus />
      <br />
      Password : <input type="password" minlength="8" maxlength="12" /> <br />
      File : <input type="file"  /> <br />
      DOB : <input type="date" /> <br />
      DOB : <input type="datetime" /> <br />
      DOB : <input type="datetime-local" /> <br />

      Phone : <input type="number" >

      <label for="gen">Gender</label>
      <input type="radio" name="gen" />MALE
      <input type="radio" name="gen" />FEMALE
      <input type="radio" name="gen" />OTHERS <br />

      <label for="hob">Hobbies :</label>
      <input type="checkbox" name="hob" />Playing
      <input type="checkbox" name="hob" />Dancing
      <input type="checkbox" name="hob" />Singing <br />

      <label for="">Courses :</label>
      <select name="" id="">
        <option value="">MCA</option>
        <option value="">BCA</option>
        <option value="">BTECH</option>
        <option value="">MTECH</option>
      </select>

      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
  </body>
</html>
