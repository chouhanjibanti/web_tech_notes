<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
       body{
        padding: 12px;
        transition: background-color 0.5 ease;
       }

       @media screen {
        body::before{
            content: "This is visible now for screen only";
            display: block;
            font-weight: bolder;
        }
       }

       @media print{
        body{
           background-color: white;
           color: brown;
        }
        body::after{
            content: "This is print only page";
            display: block;
            font-weight: bolder;
        }
         }

         /* @media(min-width: 600px){
            body{
                background-color: pink;
            }
         }

         @media(max-width: 400px){
            body{
                background-color: blueviolet;
                color: navy;
            }
         } */

         @media(min-width: 400px) and (max-width: 600px){
            body{
                background-color: brown;
                color: pink;
            }
         }
    </style>
  </head>
  <body>

</html>
