<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0%;
            padding: 0%;
        }
        .container{
            width: 300px;
            height: 200px;
            padding: 10%;
            background: url(/images/virat.webp) no-repeat center/cover;
            position: relative;
            margin: 6px auto;
            border-radius: 10px;
        }

        .text{
            position: absolute;
            top: 75%;
            left: 35%;
            background-color: purple;
            width: 20%;
            opacity: 0.5;
            border-radius: 10px;
        }

        .content{
            color: white;
            position: absolute;
            top: 75%;
            left: 40%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text">.</div>
        <div class="content"> Hello Sir</div>
    </div>
</body>
</html>
