<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pixabay Clone</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
    }

    /* ===== NAVBAR ===== */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background-color: #fff;
      border-bottom: 1px solid #ddd;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #1d1d1d;
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .nav-buttons a {
      text-decoration: none;
      color: #333;
      font-size: 14px;
    }

    .btn-join {
      border: 1px solid #333;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      background: white;
    }

    .btn-upload {
      background-color: #2ecc71;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
    }

    /* ===== HERO SECTION ===== */
    .hero {
      position: relative;
      height: 380px;
      background-image: url('https://cdn.pixabay.com/photo/2017/02/08/17/24/fantasy-2049567_1280.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }

    /* Dark overlay */
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.45);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 800px;
      padding: 0 20px;
    }

    .hero h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tab {
      background: transparent;
      border: none;
      color: white;
      font-size: 14px;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: 20px;
    }

    .tab.active {
      background: white;
      color: #333;
      font-weight: bold;
    }

    /* ===== SEARCH BAR ===== */
    .search-bar {
      display: flex;
      background: white;
      border-radius: 30px;
      overflow: hidden;
      width: 100%;
    }

    .search-bar input {
      flex: 1;
      padding: 14px 20px;
      border: none;
      outline: none;
      font-size: 15px;
    }

    .search-bar button {
      background: #2ecc71;
      border: none;
      padding: 0 24px;
      font-size: 16px;
      cursor: pointer;
      color: white;
    }

    /* ===== TAGS ===== */
    .tags {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 14px;
    }

    .tag {
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.4);
    }

    .tag:hover {
      background: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">pixabay</div> <img src="" alt="">
    <div class="nav-buttons">
      <a href="#">Explore ▾</a>
      <a href="#">Log in</a>
      <button class="btn-join">Join</button>
      <button class="btn-upload">⬆ Upload</button>
    </div>
  </nav>

  <!-- HERO SECTION -->
  <div class="hero">
    <div class="hero-content">
      <h1>Stunning royalty-free images &amp; royalty-free stock</h1>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab active">Explore</button>
        <button class="tab">Photos</button>
        <button class="tab">Illustrations</button>
        <button class="tab">Vectors</button>
        <button class="tab">Videos</button>
        <button class="tab">Music</button>
        <button class="tab">Sound Effects</button>
        <button class="tab">3D Models</button>
        <button class="tab">GIFs</button>
      </div>

      <!-- SEARCH BAR -->
      <div class="search-bar">
        <input type="text" placeholder="Search for free Images, Videos, Music & more" />
        <button>🔍</button>
      </div>
    </div>

    <!-- TAGS -->
    <div class="tags">
      <span class="tag">nature</span>
      <span class="tag">flowers</span>
      <span class="tag">background</span>
      <span class="tag">forest</span>
      <span class="tag">sunset</span>
      <span class="tag">cat</span>
      <span class="tag">landscape</span>
      <span class="tag">sky</span>
      <span class="tag">mountains</span>
      <span class="tag">wallpaper</span>
      <span class="tag">dog</span>
      <span class="tag">beach</span>
    </div>
  </div>

</body>
</html>
